syntax = "proto3";

// ── Client → Server ──────────────────────────────────────────────────────────

message Auth {
  string public_key = 1;
  string signature = 2;
  string nonce = 3;
  int64 timestamp = 4;
  string session_token = 5;
  string device_info = 6;
}

message Heartbeat {
  int64 local_time = 1;
  string last_action_id = 2;
}

message ActionBuyPlot {
  string tier = 1; // "starter" | "fertile" | "premium"
}

message ActionBuySeed {
  string crop_id = 1;
  int32 qty = 2;
}

message ActionPlantCrop {
  string plot_id = 1;
  string crop_id = 2;
}

message ActionHarvest {
  string plot_id = 1;
}

message ActionSell {
  string item_id = 1;
  int32 qty = 2;
}

message ActionCollectAnimal {
  string animal_id = 1;
}

message ActionCraft {
  string recipe_id = 1;
}

message ActionBuyAnimal {
  string animal_type = 1;
}

message ActionSellAnimal {
  string animal_id = 1;
}

message ActionFeedAnimal {
  string animal_id = 1;
}

message ActionMateAnimals {
  string sire_id = 1;
  string dam_id = 2;
}

message ActionBuyIncubator {
}

message ActionStartIncubation {
  string incubator_id = 1;
  string egg_item_id = 2;
}

message ActionFinishIncubation {
  string incubator_id = 1;
}

message ActionCureAnimal {
  string animal_id = 1;
}

message ActionDonateTreasury {
  int32 amount = 1;
}

message ActionBuyBlackMarket {
  string item_id = 1;
  int32 qty = 2;
}

message ActionCreateSyndicate {
  string name = 1;
}

message ActionJoinSyndicate {
  string syndicate_id = 1;
}

message ActionLeaveSyndicate {
}

message ActionKickMember {
  string profile_id = 1;
}

message ActionSendChat {
  string message = 1;
}

message ActionTransferFunds {
  string target_wallet = 1;
  int32 amount = 2;
}

message ActionTransferItems {
  string target_wallet = 1;
  string item_id = 2;
  int32 qty = 3;
}

message ActionFileProtest {
  string target_wallet = 1;
}

message ActionGetProtestStatus {
  string target_wallet = 1;
}

message ActionContributeBounty {
  string item_id = 1;
  int32 qty = 2;
}

message ActionGetPlayerActivity {
  string target_wallet = 1;
}

message ClientMessage {
  oneof payload {
    Auth auth = 1;
    Heartbeat heartbeat = 2;
    ActionBuyPlot buy_plot = 3;
    ActionBuySeed buy_seed = 4;
    ActionPlantCrop plant_crop = 5;
    ActionHarvest harvest = 6;
    ActionSell sell = 7;
    ActionCollectAnimal collect_animal = 8;
    ActionCraft craft = 9;
    ActionBuyAnimal buy_animal = 10;
    ActionSellAnimal sell_animal = 11;
    ActionFeedAnimal feed_animal = 12;
    ActionMateAnimals mate_animals = 13;
    ActionBuyIncubator buy_incubator = 14;
    ActionStartIncubation start_incubation = 15;
    ActionFinishIncubation finish_incubation = 16;
    ActionCureAnimal cure_animal = 17;
    ActionDonateTreasury donate_treasury = 18;
    ActionBuyBlackMarket buy_black_market = 19;
    ActionCreateSyndicate create_syndicate = 20;
    ActionJoinSyndicate join_syndicate = 21;
    ActionLeaveSyndicate leave_syndicate = 22;
    ActionKickMember kick_member = 23;
    ActionSendChat send_chat = 24;
    ActionTransferFunds transfer_funds = 25;
    ActionTransferItems transfer_items = 26;
    ActionFileProtest file_protest = 27;
    ActionGetProtestStatus get_protest_status = 28;
    ActionContributeBounty contribute_bounty = 29;
    ActionGetPlayerActivity get_player_activity = 30;
  }
}

// ── Server → Client ──────────────────────────────────────────────────────────

message AuthChallenge {
  string nonce = 1;
  int64 timestamp = 2;
  int32 expires_in = 3;
}

message AuthSuccess {
  string access_token = 1;
  string refresh_token = 2;
  int32 expires_in = 3;
}

message AuthFailed {
  string reason = 1;
}

message HeartbeatAck {
  int64 server_time = 1;
}

// Market price multipliers broadcast every game day (keyed by commodity id).
message MarketPulse {
  map<string, double> multipliers = 1;
  int64 timestamp = 2;
}

// Current game time state. Sent on connect and every game day.
message GameClock {
  string season = 1;          // "spring" | "summer" | "autumn" | "winter"
  int32 season_day = 2;       // 1-based day within the current season
  int32 year = 3;             // game year (starts at 1)
  int32 total_days = 4;       // total game days elapsed since server start
  int64 next_day_at = 5;      // unix ms when the next game day begins
  int64 next_season_at = 6;   // unix ms when the next season begins
}

// Broadcast when the season transitions.
message SeasonChange {
  string new_season = 1;      // the season that just started
  int32 year = 2;
  int64 started_at = 3;       // unix ms when this season began
}

// AI-generated market event. Broadcast on each season change.
message GameEvent {
  string event_title = 1;
  string description = 2;
  repeated string affect = 3;   // affected commodity IDs
  string outcome = 4;           // "crash" | "surge" | "boycott"
  double impact_multiplier = 5;
  string player_tip = 6;
  int64 generated_at = 7;       // unix ms
  int64 expires_at = 8;         // unix ms — when prices reset to normal
}

// ── State Updates ────────────────────────────────────────────────────────────

message BalanceUpdate {
  int64 balance = 1;
}

message InventoryUpdate {
  string item_id = 1;
  int32 quantity = 2;
}

message PlotUpdate {
  string plot_id = 1;
  string crop_id = 2;
  int64 planted_at = 3;
  bool boost_applied = 4;
}

message ActionSuccess {
  string action_type = 1;
  string message = 2;
}

message ActionError {
  string action_type = 1;
  string error = 2;
}

message AnimalUpdate {
  string id = 1;
  string animal_type = 2;
  bool locked_for_loan = 3;
  int64 last_mated_at = 4;
  int64 gestation_ready_at = 5;
  bool is_fed = 6;
}

message IncubatorUpdate {
  string id = 1;
  string egg_type = 2;
  int64 ready_at = 3;
}

message GoodwillUpdate {
  int32 points = 1;
  double effective_tax_rate = 2;
}

message TraderItem {
  string id = 1;
  int32 price = 2;
  int32 qty_available = 3;
}

message TraderArrived {
  repeated TraderItem items = 1;
  int64 expires_at = 2;
}

message ChatMessage {
  string sender_id = 1;
  string content = 2;
  int64 timestamp = 3;
}

message ProtestStatusResponse {
  string target_wallet = 1;
  string status = 2;
  int32 signer_count = 3;
  int32 required = 4;
}

message BountyStarted {
  string item_id = 1;
  int32 target_qty = 2;
  int64 expires_at = 3;
}

message BountyProgress {
  int32 current = 1;
  int32 target = 2;
}

message LeaderboardUpdate {
  message Entry {
    int32 rank = 1;
    string profile_id = 2;
    string username = 3;
    string wallet = 4;
    int32 net_worth = 5;
  }
  repeated Entry top = 1;
}

message PlayerActivityResponse {
  message Activity {
    string action = 1;
    string details = 2; // JSON string
    int64 timestamp = 3;
  }
  string target_wallet = 1;
  repeated Activity activities = 2;
}

message CommodityAlert {
  string commodity_id = 1;
  string alert = 2;
  int32 volume = 3;
  float price_impact = 4;
}

message SystemAlert {
  string message = 1;
  string level = 2; 
}

message ServerMessage {
  oneof payload {
    AuthChallenge auth_challenge = 1;
    AuthSuccess auth_success = 2;
    AuthFailed auth_failed = 3;
    MarketPulse market_pulse = 4;
    HeartbeatAck heartbeat_ack = 5;
    GameClock game_clock = 6;
    SeasonChange season_change = 7;
    GameEvent game_event = 8;
    BalanceUpdate balance_update = 9;
    InventoryUpdate inventory_update = 10;
    PlotUpdate plot_update = 11;
    ActionSuccess action_result = 12;
    ActionError action_error = 13;
    AnimalUpdate animal_update = 14;
    IncubatorUpdate incubator_update = 15;
    GoodwillUpdate goodwill_update = 16;
    TraderArrived trader_arrived = 17;
    ChatMessage chat_message = 18;
    ProtestStatusResponse protest_status = 19;
    BountyStarted bounty_started = 20;
    BountyProgress bounty_progress = 21;
    LeaderboardUpdate leaderboard_update = 22;
    PlayerActivityResponse player_activity = 23;
    CommodityAlert commodity_alert = 24;
    SystemAlert system_alert = 25;
  }
}
